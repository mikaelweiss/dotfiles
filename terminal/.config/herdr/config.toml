onboarding = false
# Keybindings mirror ~/.config/tmux/tmux.conf + tmux.reset.conf where herdr
# has an equivalent action. Herdr defaults already match tmux for pane focus
# (prefix+j/k; h/l are set below), zoom (prefix+z), and config reload
# (prefix+shift+r).

[theme]
name = "catppuccin"

[keys]
prefix = "ctrl+f"

# tmux: bind n new-window
new_tab = "prefix+n"
# tmux: bind Left/Right previous-window/next-window
previous_tab = "prefix+left"
next_tab = "prefix+right"
# option+1..9 jumps straight to a tab without the prefix; requires the
# alt+digit esc: keybinds in the ghostty config, since macOS option+digit
# types special characters (¡™£…) instead of sending alt. Setting this
# replaces the built-in prefix+1..9 default, so it is restated alongside.
switch_tab = ["alt+1..9", "prefix+1..9"]
# tmux: bind r rename-window
rename_tab = "prefix+r"
# tmux: bind c kill-pane
close_pane = "prefix+c"
# tmux: bind s split -h (side by side), bind v split -v (stacked)
split_vertical = "prefix+s"
split_horizontal = "prefix+v"
# setting these replaces the built-in prefix+h/l defaults, so they are
# restated alongside the ctrl-held variants
focus_pane_left = ["prefix+h", "prefix+ctrl+h"]
focus_pane_right = ["prefix+l", "prefix+ctrl+l"]
# tmux: bind ^D detach
detach = "prefix+ctrl+d"
# tmux: bind ^F last-window (prefix+ctrl+f is reserved for sending a literal
# ctrl+f to the pane, so the double-tap becomes prefix then plain f)
last_pane = "prefix+f"
# tmux: sessionx project picker on prefix+o
workspace_picker = "prefix+o"
# ctrl+1..9 jumps straight to a workspace without the prefix; requires the
# matching super+digit unbinds in the ghostty config so the chords reach herdr
switch_workspace = ["ctrl+1..9", "prefix+shift+1..9"]
# tmux: bind S choose-session
goto = "prefix+shift+s"
# settings moves off prefix+s (taken by split); comma matches macOS Cmd+,
settings = "prefix+comma"
resize_mode = "prefix+minus"
# notification target moves off prefix+o (taken by workspace picker)
open_notification_target = "prefix+shift+o"

# tmux: floax scratch terminal on prefix+p
[[keys.command]]
key = "prefix+p"
type = "pane"
command = "zsh"

[ui]
# tmux: pane-active-border-style fg=magenta
accent = "magenta"
# split panes share single divider lines; herdr always draws the outer
# border ring too — interior-only (tmux-style) borders aren't supported
pane_borders = true
pane_gaps = false
# tmux new-window creates instantly without prompting for a name
prompt_new_tab_name = false

show_agent_labels_on_pane_borders = false
agent_panel_sort = "spaces"
[experimental]
# tmux: continuum/resurrect restore across restarts
pane_history = true
